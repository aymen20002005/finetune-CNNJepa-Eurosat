seed: 42

name: "CNN-JEPA_eurosat_{backbone_name}"
artifacts_root: "artifacts/pretrain_lightly/ijepacnn"

mask:
  strategy: "mixed" # multi-block | random | mixed
  mutli_block_kwargs:
    aspect_ratio: [0.75, 1.5]
    enc_mask_scale: [1.0, 1.0]
    min_keep: 5
    num_enc_blocks: 1
    num_pred_blocks: 4
    pred_mask_scale: [0.15, 0.2]
  mixed_mutli_block_ratio: 0.75

mask_ratio: 0.6

backbone:
  name: "resnet50"
  pretrained_weights: null # "imagenet" / null
  kwargs:
    global_pool: '' # remove the final pooling layer

predictor:
  n_layers: 3
  kernel_size: 3
  dw_sep_conv: True

use_projection_head: False

data:
  dataset_name: "eurosat"
  root: "EuroSAT"   # path relative to the working directory (or use an absolute path)
  num_workers: 4

trainer:
  max_epochs: 100
  devices: "auto"
  accelerator: "gpu"
  precision: "bf16"
  accumulate_grad_batches: null
  overfit_batches: 0.0

optimizer:
  batch_size: 64
  lr: 0.001
  weight_decay: 0.01
  cosine_warmpup_sched: True
  lr_warmup_epochs: 10
  exclude_norm_and_bias_from_wd: False
  wd_schedule: False

wandb: true # set to false to disable wandb logging

# disable hydra outputs
hydra:
  output_subdir: null
  run:
    dir: .
